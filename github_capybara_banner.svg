<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="300" viewBox="0 0 1000 300" role="img" aria-labelledby="title desc">
  <title id="title">GitHub README Banner</title>
  <desc id="desc">A dark professional banner with a capybara at a desk and text highlighting Python, Scrapy, MySQL, PostgreSQL, and OpenRefine.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0b1220" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#0b1220" stop-opacity="0.15"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <style>
      .title { font: 700 38px 'Segoe UI', Inter, Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 18px 'Segoe UI', Inter, Arial, sans-serif; fill: #cbd5e1; }
      .chip { font: 600 14px 'Segoe UI', Inter, Arial, sans-serif; fill: #e2e8f0; }
      .small { font: 500 13px 'Segoe UI', Inter, Arial, sans-serif; fill: #94a3b8; letter-spacing: 0.12em; }
    </style>
  </defs>

  <rect width="1000" height="300" fill="url(#bg)"/>

  <!-- soft grid -->
  <g opacity="0.08" stroke="#93c5fd">
    <path d="M0 60H1000M0 120H1000M0 180H1000M0 240H1000"/>
    <path d="M100 0V300M200 0V300M300 0V300M400 0V300M500 0V300M600 0V300M700 0V300M800 0V300M900 0V300"/>
  </g>

  <!-- left info panel -->
  <rect x="42" y="34" rx="24" ry="24" width="560" height="232" fill="url(#panel)" stroke="#334155" stroke-opacity="0.65"/>

  <text x="66" y="82" class="small">DATA WORKFLOW</text>
  <text x="66" y="126" class="title">Building useful data from the web</text>
  <text x="66" y="158" class="subtitle">Python, Scrapy, MySQL, PostgreSQL, and OpenRefine</text>
  <text x="66" y="186" class="subtitle">Web scraping, storage, cleaning, and practical data workflows</text>

  <!-- chips -->
  <g filter="url(#shadow)">
    <rect x="66" y="212" rx="18" ry="18" width="86" height="34" fill="#1d4ed8"/>
    <text x="109" y="234" text-anchor="middle" class="chip">Python</text>

    <rect x="162" y="212" rx="18" ry="18" width="86" height="34" fill="#065f46"/>
    <text x="205" y="234" text-anchor="middle" class="chip">Scrapy</text>

    <rect x="258" y="212" rx="18" ry="18" width="82" height="34" fill="#7c3aed"/>
    <text x="299" y="234" text-anchor="middle" class="chip">MySQL</text>

    <rect x="350" y="212" rx="18" ry="18" width="106" height="34" fill="#92400e"/>
    <text x="403" y="234" text-anchor="middle" class="chip">PostgreSQL</text>

    <rect x="466" y="212" rx="18" ry="18" width="112" height="34" fill="#be123c"/>
    <text x="522" y="234" text-anchor="middle" class="chip">OpenRefine</text>
  </g>

  <!-- right illustration group -->
  <g transform="translate(642,34)" filter="url(#shadow)">
    <!-- desk -->
    <rect x="46" y="154" width="250" height="16" rx="8" fill="#8b5e34"/>
    <rect x="58" y="168" width="10" height="58" fill="#6b4423"/>
    <rect x="272" y="168" width="10" height="58" fill="#6b4423"/>

    <!-- monitor -->
    <rect x="38" y="74" width="98" height="66" rx="10" fill="#dbe4ea"/>
    <rect x="48" y="84" width="78" height="46" rx="6" fill="#0f766e"/>
    <rect x="80" y="140" width="14" height="14" fill="#94a3b8"/>
    <rect x="68" y="154" width="40" height="6" rx="3" fill="#64748b"/>
    <path d="M60 96h20M60 107h28M60 118h18M90 96h14M96 118h20" stroke="#bbf7d0" stroke-width="4" stroke-linecap="round"/>

    <!-- keyboard -->
    <rect x="128" y="147" width="72" height="16" rx="8" fill="#334155"/>

    <!-- mug -->
    <rect x="18" y="143" width="24" height="26" rx="6" fill="#22c55e"/>
    <path d="M42 149c8 0 8 14 0 14" fill="none" stroke="#22c55e" stroke-width="4"/>
    <path d="M25 133c-3 -8 7 -11 2 -18M34 133c-3 -8 7 -11 2 -18" fill="none" stroke="#cbd5e1" stroke-width="2" opacity="0.8"/>

    <!-- chair -->
    <rect x="220" y="122" width="32" height="72" rx="14" fill="#1e40af"/>
    <rect x="230" y="188" width="10" height="34" fill="#475569"/>

    <!-- capybara -->
    <ellipse cx="210" cy="111" rx="54" ry="43" fill="#b7793f"/>
    <ellipse cx="192" cy="113" rx="18" ry="15" fill="#8b5a2b"/>
    <circle cx="236" cy="103" r="4" fill="#111827"/>
    <circle cx="224" cy="80" r="8" fill="#8b5a2b"/>
    <circle cx="244" cy="82" r="7" fill="#8b5a2b"/>

    <!-- shirt -->
    <path d="M170 138c10-18 64-18 77 2l4 44h-88z" fill="#f8fafc"/>
    <path d="M203 138l12 0l-6 18z" fill="#2563eb"/>
    <path d="M207 156l8 26l-12 0z" fill="#1d4ed8"/>

    <!-- arms -->
    <ellipse cx="178" cy="157" rx="20" ry="11" fill="#b7793f" transform="rotate(-10 178 157)"/>
    <ellipse cx="223" cy="160" rx="24" ry="12" fill="#b7793f" transform="rotate(8 223 160)"/>

    <!-- legs -->
    <ellipse cx="200" cy="220" rx="22" ry="10" fill="#8b5a2b"/>
    <ellipse cx="245" cy="220" rx="22" ry="10" fill="#8b5a2b"/>

    <!-- plant -->
    <rect x="308" y="132" width="28" height="24" rx="5" fill="#8b5e34"/>
    <path d="M322 132c0-20 24-20 24-4c-10 0-10 12-24 4zM316 132c0-16-20-18-24-4c8 0 8 10 24 4zM325 130c6-22 26-18 20 0c-8-2-12 6-20 0z" fill="#22c55e"/>
  </g>

  <!-- subtle bottom accent -->
  <rect y="288" width="1000" height="12" fill="#2563eb" opacity="0.85"/>
</svg>
